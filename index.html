<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Severe Weather Tracker</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.form-section {
    flex: 1;
    padding: 15px;
    min-width: 300px;
    background: white;
}

#map {
    height: 400px;
    margin-top: 10px;
}

.reports {
    flex: 1;
    padding: 15px;
    min-width: 300px;
}

.report-card {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-left: 5px solid #3498db;
}

img.preview {
    max-width: 100%;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
    <h1>Severe Weather Tracker</h1>
</header>

<div class="container">

    <!-- FORM -->
    <div class="form-section">
        <h2>Report Weather</h2>

        <label>Weather Type:</label><br>
        <select id="weatherType">
            <option value="Tornado">Tornado</option>
            <option value="Hail">Hail</option>
            <option value="Flood">Flood</option>
            <option value="Thunderstorm">Thunderstorm</option>
            <option value="Snow">Snow</option>
        </select><br><br>

        <label>Description:</label><br>
        <textarea id="description" rows="4" style="width:100%;"></textarea><br><br>

        <label>Upload Image:</label><br>
        <input type="file" id="imageUpload"><br><br>

        <p><strong>Click map to set location</strong></p>
        <div id="map"></div><br>

        <button onclick="submitReport()">Submit Report</button>
    </div>

    <!-- REPORTS -->
    <div class="reports">
        <h2>Reports</h2>
        <div id="reportList"></div>
    </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let selectedLat = null;
let selectedLng = null;

// Initialize map
const map = L.map('map').setView([37.33, -79.18], 8);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let marker;

// Click map to select location
map.on('click', function(e) {
    selectedLat = e.latlng.lat;
    selectedLng = e.latlng.lng;

    if (marker) {
        marker.setLatLng(e.latlng);
    } else {
        marker = L.marker(e.latlng).addTo(map);
    }
});

// Load saved reports
let reports = JSON.parse(localStorage.getItem('reports')) || [];
renderReports();

function submitReport() {
    const type = document.getElementById('weatherType').value;
    const desc = document.getElementById('description').value;
    const imageInput = document.getElementById('imageUpload');

    if (!selectedLat || !selectedLng) {
        alert("Please select a location on the map.");
        return;
    }

    const reader = new FileReader();

    reader.onload = function() {
        const report = {
            type,
            desc,
            lat: selectedLat,
            lng: selectedLng,
            image: reader.result || null
        };

        reports.push(report);
        localStorage.setItem('reports', JSON.stringify(reports));

        renderReports();
    };

    if (imageInput.files[0]) {
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        reader.onload();
    }
}

function renderReports() {
    const list = document.getElementById('reportList');
    list.innerHTML = "";

    reports.forEach(r => {
        const div = document.createElement('div');
        div.className = "report-card";

        div.innerHTML = `
            <strong>${r.type}</strong><br>
            ${r.desc}<br>
            <small>Lat: ${r.lat.toFixed(2)}, Lng: ${r.lng.toFixed(2)}</small>
        `;

        if (r.image) {
            const img = document.createElement('img');
            img.src = r.image;
            img.className = "preview";
            div.appendChild(img);
        }

        list.appendChild(div);
    });
}
</script>

</body>
</html>
